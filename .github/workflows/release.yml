name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: read

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Read pinned versions
        run: |
          source versions.lock
          echo "TOOLKIT_VERSION=$TOOLKIT_VERSION" >> $GITHUB_ENV

      - name: Install Kairos Toolkit
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/Cnext-eu/kairos-ontology-toolkit.git@v${TOOLKIT_VERSION}"
        env:
          GIT_ASKPASS: echo
          GIT_USERNAME: x-access-token
          GIT_PASSWORD: ${{ secrets.SMARTCODING_ONTOLOGY_TOOLKIT }}
      
      - name: Install other dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Validate before release
        run: |
          kairos-ontology validate \
            --ontologies ontology-hub/ontologies \
            --shapes ontology-hub/shapes \
            --catalog ontology-reference-models/catalog-v001.xml
      
      - name: Generate all projections
        run: |
          kairos-ontology project \
            --ontologies ontology-hub/ontologies \
            --catalog ontology-reference-models/catalog-v001.xml \
            --output ontology-hub/output \
            --target all
      
      - name: Create release archive
        run: |
          tar -czf ontologies-${{ github.ref_name }}.tar.gz \
            ontology-hub/ontologies/ ontology-hub/shapes/ ontology-hub/mappings/ ontology-hub/output/
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ontologies-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false

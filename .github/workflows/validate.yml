name: Validate Ontologies

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Read pinned versions
        run: |
          source versions.lock
          echo "TOOLKIT_VERSION=$TOOLKIT_VERSION" >> $GITHUB_ENV

      - name: Install Kairos Toolkit
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/Cnext-eu/kairos-ontology-toolkit.git@v${TOOLKIT_VERSION}"
        env:
          GIT_ASKPASS: echo
          GIT_USERNAME: x-access-token
          GIT_PASSWORD: ${{ secrets.SMARTCODING_ONTOLOGY_TOOLKIT }}
      
      - name: Install other dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Validate ontologies
        run: |
          kairos-ontology validate \
            --ontologies ontology-hub/ontologies \
            --shapes ontology-hub/shapes \
            --catalog ontology-reference-models/catalog-v001.xml
      
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validation-report.json
      
      - name: Comment on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Ontology validation failed. Check the validation report artifact for details.'
            })

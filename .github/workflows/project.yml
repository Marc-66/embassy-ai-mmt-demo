name: Generate Projections

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  project:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Read pinned versions
        run: |
          source versions.lock
          echo "TOOLKIT_VERSION=$TOOLKIT_VERSION" >> $GITHUB_ENV

      - name: Install Kairos Toolkit
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/Cnext-eu/kairos-ontology-toolkit.git@v${TOOLKIT_VERSION}"
        env:
          GIT_ASKPASS: echo
          GIT_USERNAME: x-access-token
          GIT_PASSWORD: ${{ secrets.SMARTCODING_ONTOLOGY_TOOLKIT }}
      
      - name: Install other dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Generate all projections
        run: |
          kairos-ontology project \
            --target all \
            --ontologies ontology-hub/ontologies \
            --catalog ontology-reference-models/catalog-v001.xml \
            --output ontology-hub/output
      
      - name: Upload projections
        uses: actions/upload-artifact@v4
        with:
          name: projections
          path: ontology-hub/output/
          retention-days: 30
      
      - name: Upload DBT models
        uses: actions/upload-artifact@v4
        with:
          name: dbt-models
          path: ontology-hub/output/dbt/
          retention-days: 90
      
      - name: Upload Neo4j schema
        uses: actions/upload-artifact@v4
        with:
          name: neo4j-schema
          path: ontology-hub/output/neo4j/
          retention-days: 90
